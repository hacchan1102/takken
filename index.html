<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>宅建士 過去問クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f2e9;
  --paper2:#efe9dc;
  --card:#fffdf8;
  --ink:#23303a;
  --ink2:#54616b;
  --line:#e2dac9;
  --brass:#b0823a;
  --brass-d:#8c6526;
  --ok:#2f7d57;
  --ok-bg:#e7f3ec;
  --ng:#bb4536;
  --ng-bg:#fae9e6;
  --s-ken:#6a4a9c;
  --s-hou:#2f7d6b;
  --s-gyo:#b0823a;
  --s-zei:#c0584a;
  --shadow:0 1px 2px rgba(35,48,58,.06),0 6px 18px rgba(35,48,58,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans JP",system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;padding:0 16px calc(env(safe-area-inset-bottom) + 40px);position:relative}
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.serif{font-family:"Noto Serif JP",serif}

/* header */
.appbar{position:sticky;top:0;z-index:30;background:var(--paper);
  padding:calc(env(safe-area-inset-top) + 14px) 0 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px}
.appbar .brand{font-family:"Noto Serif JP",serif;font-weight:900;font-size:20px;letter-spacing:.01em;flex:1}
.appbar .brand small{display:block;font-family:"Noto Sans JP";font-weight:500;font-size:10.5px;letter-spacing:.18em;color:var(--brass-d);margin-top:1px}
.pill{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer}
.pill:active{transform:scale(.97)}

/* hero */
.hero{position:relative;margin-top:16px;border-radius:18px;overflow:hidden;
  background:linear-gradient(155deg,#26333d,#1a2730);color:#f4efe2;padding:22px 20px 20px;box-shadow:var(--shadow)}
.hero .grid-bg{position:absolute;inset:0;opacity:.16;
  background-image:linear-gradient(#cdb98e 1px,transparent 1px),linear-gradient(90deg,#cdb98e 1px,transparent 1px);
  background-size:26px 26px;mask:radial-gradient(120% 90% at 80% 10%,#000,transparent 75%)}
.hero h2{position:relative;margin:0;font-family:"Noto Serif JP",serif;font-weight:900;font-size:21px;line-height:1.45}
.hero p{position:relative;margin:6px 0 16px;font-size:12.5px;color:#cdc4b1}
.hero .stats{position:relative;display:flex;gap:14px}
.hero .stat{flex:1}
.hero .stat b{display:block;font-family:"Noto Serif JP";font-weight:900;font-size:24px;line-height:1}
.hero .stat span{font-size:10.5px;color:#bdb39d;letter-spacing:.08em}
.hero .bar{position:relative;margin-top:14px;height:7px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
.hero .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brass),#dcb86a);border-radius:99px;transition:width .6s}

/* sections */
.sec-label{display:flex;align-items:center;gap:10px;margin:26px 2px 12px;font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--ink2)}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mode{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 14px;text-align:left;cursor:pointer;box-shadow:var(--shadow);position:relative;transition:transform .12s}
.mode:active{transform:translateY(1px) scale(.99)}
.mode .ic{font-size:22px;line-height:1}
.mode h3{margin:9px 0 2px;font-size:15px;font-weight:700}
.mode p{margin:0;font-size:11px;color:var(--ink2);line-height:1.5}
.mode .edge{position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:99px;background:var(--brass)}
.mode.m-qa .edge{background:var(--s-ken)}
.mode.m-weak .edge{background:var(--s-zei)}
.mode.m-shuf .edge{background:var(--s-hou)}
.mode.m-mock .edge{background:var(--s-gyo)}

.row{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;cursor:pointer;box-shadow:var(--shadow);margin-bottom:9px;text-align:left}
.row:active{transform:scale(.995)}
.row .ic{font-size:18px}
.row .t{flex:1}
.row .t b{font-size:14px;font-weight:700}
.row .t span{display:block;font-size:11px;color:var(--ink2)}
.row .n{font-size:13px;font-weight:800;color:var(--brass-d);font-family:"Noto Serif JP"}
.row .arr{color:#c3b89f;font-size:16px}

.note{margin:22px 2px 0;font-size:10.5px;color:var(--ink2);line-height:1.7;border-top:1px dashed var(--line);padding-top:14px}
.note a{color:var(--brass-d)}

/* generic page header */
.phead{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 14px) 0 12px;position:sticky;top:0;background:var(--paper);z-index:20;border-bottom:1px solid var(--line)}
.back{border:none;background:none;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;padding:6px 8px 6px 0}
.phead h2{flex:1;margin:0;font-size:16px;font-weight:800;font-family:"Noto Serif JP"}

/* subject picker */
.subj{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.subj button{display:flex;align-items:center;gap:13px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;text-align:left;box-shadow:var(--shadow)}
.subj button.sel{border-color:var(--ink);background:#fffef9}
.subj .dot{width:11px;height:11px;border-radius:50%;flex:none}
.subj .t{flex:1}
.subj .t b{font-size:15px;font-weight:700}
.subj .t span{display:block;font-size:11px;color:var(--ink2)}
.subj .ct{font-size:12px;color:var(--ink2);font-weight:700}
.startbtn{position:sticky;bottom:16px;margin-top:20px;width:100%;border:none;border-radius:14px;background:var(--ink);color:#f6f2e9;font-size:15.5px;font-weight:800;padding:16px;cursor:pointer;box-shadow:0 8px 22px rgba(35,48,58,.22)}
.startbtn:disabled{opacity:.4}
.startbtn:active{transform:translateY(1px)}

/* quiz */
.qtop{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top) + 12px) 0 10px;position:sticky;top:0;background:var(--paper);z-index:20}
.qtop .x{border:none;background:none;font-size:20px;color:var(--ink2);cursor:pointer;padding:4px}
.qprog{flex:1;height:6px;background:var(--paper2);border-radius:99px;overflow:hidden}
.qprog i{display:block;height:100%;background:var(--brass);transition:width .3s}
.qcount{font-size:12px;font-weight:800;color:var(--ink2);font-variant-numeric:tabular-nums}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 17px;margin-top:14px}
.qmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;color:#fff}
.tag.ghost{background:none;color:var(--ink2);border:1px solid var(--line)}
.qstem{font-size:15px;font-weight:500;line-height:1.85}
.qstem .lead{font-weight:700}
.choices{margin-top:16px;display:flex;flex-direction:column;gap:9px}
.choice{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 13px;cursor:pointer;text-align:left;font-size:13.5px;line-height:1.7;transition:border-color .12s,background .12s}
.choice:active{transform:scale(.996)}
.choice .num{flex:none;width:23px;height:23px;border-radius:7px;background:var(--paper2);color:var(--ink);font-weight:800;font-size:12px;display:grid;place-items:center;font-family:"Noto Serif JP"}
.choice.correct{border-color:var(--ok);background:var(--ok-bg)}
.choice.correct .num{background:var(--ok);color:#fff}
.choice.wrong{border-color:var(--ng);background:var(--ng-bg)}
.choice.wrong .num{background:var(--ng);color:#fff}
.choice.dim{opacity:.55}

/* ox buttons */
.oxstmt{font-size:15.5px;line-height:1.95;font-weight:500;margin-top:4px}
.oxbtns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.oxbtn{border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:18px 0;font-size:30px;cursor:pointer;font-weight:800}
.oxbtn.maru{color:var(--ok)}
.oxbtn.batsu{color:var(--ng)}
.oxbtn:active{transform:scale(.97)}

/* feedback */
.fb{margin-top:14px;border-radius:14px;padding:14px 15px;font-size:13px;line-height:1.8;border:1px solid var(--line);background:var(--card);animation:fade .2s}
.fb.ok{border-color:var(--ok);background:var(--ok-bg)}
.fb.ng{border-color:var(--ng);background:var(--ng-bg)}
.fb .ttl{font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.fb .ttl .ans{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--ink2)}
.fb .exp{color:var(--ink)}
.fbbar{display:flex;gap:9px;margin-top:14px}
.flagbtn{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 12px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink2)}
.flagbtn.on{background:#fff7e6;border-color:var(--brass);color:var(--brass-d)}
.nextbtn{flex:1;border:none;border-radius:11px;background:var(--ink);color:#f6f2e9;font-size:14.5px;font-weight:800;padding:12px;cursor:pointer}
.nextbtn:active{transform:translateY(1px)}

/* result */
.result{text-align:center;padding-top:40px}
.scorering{width:170px;height:170px;margin:14px auto 6px;border-radius:50%;display:grid;place-items:center;position:relative}
.scorering svg{position:absolute;inset:0;transform:rotate(-90deg)}
.scorering .pct{font-family:"Noto Serif JP";font-weight:900;font-size:42px}
.scorering .pct small{font-size:16px;font-weight:700}
.result h2{font-family:"Noto Serif JP";font-size:22px;margin:6px 0 2px}
.result .sub{color:var(--ink2);font-size:13px}
.resbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 16px;margin:20px 0;box-shadow:var(--shadow)}
.resrow{display:flex;justify-content:space-between;padding:11px 0;font-size:13px;border-bottom:1px solid var(--line)}
.resrow:last-child{border:none}
.resrow b{font-weight:800;font-variant-numeric:tabular-nums}

/* stats */
.statcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-top:16px}
.statbig{display:flex;gap:16px;align-items:center}
.statbig .big{font-family:"Noto Serif JP";font-weight:900;font-size:40px;line-height:1}
.statbig .meta{font-size:12px;color:var(--ink2)}
.sbar{margin-top:16px}
.sbar .lab{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px}
.sbar .lab span:last-child{color:var(--ink2);font-variant-numeric:tabular-nums}
.sbar .track{height:9px;border-radius:99px;background:var(--paper2);overflow:hidden}
.sbar .track i{display:block;height:100%;border-radius:99px;transition:width .6s}

/* search & lists */
.searchbar{display:flex;gap:8px;margin-top:16px}
.searchbar input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink)}
.searchbar input:focus{outline:none;border-color:var(--brass)}
.searchbar button{border:none;background:var(--ink);color:#f6f2e9;border-radius:12px;padding:0 18px;font-weight:800;cursor:pointer}
.listitem{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-top:10px;cursor:pointer;box-shadow:var(--shadow)}
.listitem .h{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.listitem .body{font-size:13px;color:var(--ink);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;color:var(--ink2);font-size:13px;padding:60px 20px;line-height:1.9}
.empty .ic{font-size:34px;display:block;margin-bottom:10px}

.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#f6f2e9;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:90}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tabs{display:flex;gap:6px;margin-top:14px;background:var(--paper2);padding:4px;border-radius:12px}
.tabs button{flex:1;border:none;background:none;padding:9px 0;font-size:12.5px;font-weight:700;color:var(--ink2);border-radius:9px;cursor:pointer}
.tabs button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
</style>
</head>
<body>
<div class="wrap">

<!-- ===== HOME ===== -->
<section id="home" class="screen active">
  <div class="appbar">
    <div class="brand">宅建士 過去問クイズ<small>TAKKEN PAST EXAM</small></div>
    <button class="pill" onclick="go('stats')">📊 成績</button>
  </div>

  <div class="hero">
    <div class="grid-bg"></div>
    <h2>過去問で、合格点をつくる。</h2>
    <p>令和6年度（2024年度）本試験 全50問</p>
    <div class="stats">
      <div class="stat"><b id="h-acc">—</b><span>正答率</span></div>
      <div class="stat"><b id="h-done">0<small style="font-size:13px">/50</small></b><span>学習済み</span></div>
      <div class="stat"><b id="h-streak">0</b><span>連続正解</span></div>
    </div>
    <div class="bar"><i id="h-bar" style="width:0%"></i></div>
  </div>

  <div class="sec-label">問題を解く</div>
  <div class="grid2">
    <button class="mode m-qa" onclick="openPicker('qa')"><span class="edge"></span><div class="ic">📖</div><h3>一問一答</h3><p>選択肢ごとに○×で判断</p></button>
    <button class="mode m-weak" onclick="startWeak()"><span class="edge"></span><div class="ic">🎯</div><h3>苦手集中</h3><p>間違えた問題を再挑戦</p></button>
    <button class="mode m-shuf" onclick="openPicker('shuffle')"><span class="edge"></span><div class="ic">🔀</div><h3>シャッフル</h3><p>選択肢をランダムに</p></button>
    <button class="mode m-mock" onclick="openPicker('mock')"><span class="edge"></span><div class="ic">📋</div><h3>模擬テスト</h3><p>本番形式で採点</p></button>
  </div>

  <div class="sec-label">復習する</div>
  <button class="row" onclick="openReview('wrong')"><span class="ic">❌</span><div class="t"><b>間違えた問題</b><span>一度でも誤答した問題</span></div><span class="n" id="r-wrong">0</span><span class="arr">›</span></button>
  <button class="row" onclick="openReview('qa')"><span class="ic">📝</span><div class="t"><b>一問一答の間違い</b><span>○×で誤った選択肢</span></div><span class="n" id="r-qa">0</span><span class="arr">›</span></button>
  <button class="row" onclick="openReview('flag')"><span class="ic">🚩</span><div class="t"><b>フラグした選択肢</b><span>あとで見返す印</span></div><span class="n" id="r-flag">0</span><span class="arr">›</span></button>

  <div class="sec-label">その他</div>
  <button class="row" onclick="go('search')"><span class="ic">🔍</span><div class="t"><b>問題検索</b><span>キーワードで探す</span></div><span class="arr">›</span></button>
  <button class="row" onclick="resetData()"><span class="ic">🔄</span><div class="t"><b>学習データをリセット</b><span>解答履歴をすべて消去</span></div><span class="arr">›</span></button>

  <p class="note">出典：一般財団法人 不動産適正取引推進機構（RETIO）公開の「宅建試験の問題及び正解番号表」より令和6年度本試験の問題・正解を使用。解説は本アプリ独自のものです。学習用の非公式アプリであり、正確性を保証するものではありません（法改正等にご注意ください）。</p>
</section>

<!-- ===== SUBJECT PICKER ===== -->
<section id="picker" class="screen">
  <div class="phead"><button class="back" onclick="go('home')">← 戻る</button><h2 id="pk-title">科目を選ぶ</h2></div>
  <p style="font-size:12.5px;color:var(--ink2);margin:14px 2px 0" id="pk-desc"></p>
  <div class="subj" id="pk-list"></div>
  <button class="startbtn" id="pk-start" onclick="startFromPicker()">スタート →</button>
</section>

<!-- ===== QUIZ ===== -->
<section id="quiz" class="screen">
  <div class="qtop">
    <button class="x" onclick="confirmQuit()">✕</button>
    <div class="qprog"><i id="q-prog" style="width:0%"></i></div>
    <span class="qcount" id="q-count">1 / 1</span>
  </div>
  <div id="q-body"></div>
</section>

<!-- ===== RESULT ===== -->
<section id="result" class="screen">
  <div class="result">
    <div class="scorering" id="r-ring"></div>
    <h2 id="r-title">おつかれさまでした</h2>
    <div class="sub" id="r-sub"></div>
    <div class="resbox" id="r-box"></div>
    <button class="startbtn" style="position:static" onclick="go('home')">ホームに戻る</button>
  </div>
</section>

<!-- ===== STATS ===== -->
<section id="stats" class="screen">
  <div class="phead"><button class="back" onclick="go('home')">← 戻る</button><h2>成績</h2></div>
  <div class="statcard">
    <div class="statbig">
      <div class="big" id="st-acc">—</div>
      <div class="meta">総合正答率<br><span id="st-meta" style="color:var(--ink)"></span></div>
    </div>
    <div id="st-bars"></div>
  </div>
  <div class="sec-label">科目別の進捗</div>
  <div id="st-subj"></div>
</section>

<!-- ===== SEARCH ===== -->
<section id="search" class="screen">
  <div class="phead"><button class="back" onclick="go('home')">← 戻る</button><h2>問題検索</h2></div>
  <div class="searchbar">
    <input id="se-input" placeholder="キーワード（例：クーリング・オフ）" autocomplete="off">
    <button onclick="runSearch()">検索</button>
  </div>
  <div id="se-results"></div>
</section>

<!-- ===== REVIEW ===== -->
<section id="review" class="screen">
  <div class="phead"><button class="back" onclick="go('home')">← 戻る</button><h2 id="rv-title">復習</h2></div>
  <div id="rv-list"></div>
</section>

</div>
<div class="toast" id="toast"></div>

<script>
/* ============================ DATA ============================ */
const SUBJECTS = {
  ken:{name:"権利関係", color:"var(--s-ken)", hex:"#6a4a9c", desc:"民法・借地借家法・区分所有法ほか"},
  hou:{name:"法令上の制限", color:"var(--s-hou)", hex:"#2f7d6b", desc:"都市計画法・建築基準法ほか"},
  gyo:{name:"宅建業法", color:"var(--s-gyo)", hex:"#b0823a", desc:"宅地建物取引業法"},
  zei:{name:"税・その他", color:"var(--s-zei)", hex:"#c0584a", desc:"税・鑑定・住宅金融・統計・土地建物"},
};

// pol: 'c' = 正しい/適法を選ぶ → 正解肢が○・他は× ／ 'i' = 誤り/不適当を選ぶ → 正解肢が×・他は○ ／ 'w' = 個数・組合せ（○×分解しない）
const QUESTIONS = [
{id:"R6-1",s:"ken",law:"民法",n:1,pol:"c",a:0,
 lead:"法律行為に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",
 c:["営業を許された未成年者が、その営業に関する意思表示をした時に意思能力を有しなかった場合は、その法律行為は無効である。",
    "公の秩序に反する法律行為であっても、当事者が納得して合意した場合には、その法律行為は有効である。",
    "詐欺による意思表示は取り消すことによって初めから無効であったとみなされるのに対し、強迫による意思表示は取り消すまでもなく無効である。",
    "他人が所有している土地を目的物にした売買契約は無効であるが、当該他人がその売買契約を追認した場合にはその売買契約は有効となる。"],
 exp:"意思能力を欠く状態でした法律行為は無効（民法3条の2）。たとえ営業を許された未成年者でも、意思能力がなければその行為は無効です。2は公序良俗違反で無効、3は強迫も取消しで当然無効ではない、4は他人物売買も契約として有効に成立するため誤り。"},
{id:"R6-2",s:"ken",law:"委任",n:2,pol:"i",a:3,
 lead:"委任契約・準委任契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",
 c:["売主から委託を受け、売主と一体となってマンション販売の一切の事務を行っていた宅地建物取引業者も、買主に対して防火戸の操作方法について説明する信義則上の義務を負うことがある。",
    "受任者は、委任者の許諾を得たとき、又はやむを得ない事由があるときでなければ、復受任者を選任することができない。",
    "委任契約で本人が死亡しても代理権が消滅しない旨を合意して代理人に代理権を与えた場合、本人が死亡しても代理権は消滅しない。",
    "委任は、当事者の一方が仕事を完成することを相手方に約し、相手方がその仕事の結果に対しその報酬を支払うことを約さなければ、その効力を生じない。"],
 exp:"4は請負契約の説明です。委任は事務処理を委託し相手方が承諾することで成立する諾成契約で、「仕事の完成」「報酬の約束」を効力要件としません。よって4が誤り。"},
{id:"R6-3",s:"ken",law:"共有",n:3,pol:"c",a:2,
 lead:"甲土地をA・B・C・Dが各4分の1で共有し、A・B・CのいずれもDの所在を知ることができない場合に関する記述のうち、正しいものはどれか（Dの持分は相続財産に属しない）。",
 c:["甲土地に著しい変更を伴う変更を加えるには共有者の過半数の同意で足り、本件ではA・B・Cの同意が必要となる。",
    "登記名義人が所有者でないEである場合、持分に基づきEに登記抹消を求めるにはA・B・Cのうち2人の同意が必要である。",
    "A・B・Cの同意があれば、資材置場として借りたいFと期間3年の賃貸借契約を締結することができる。",
    "裁判所がDの持分をAに取得させる決定をした場合、Dは決定から3年以内に限り、時価相当額の支払を請求できる。"],
 exp:"3年以内の土地賃貸借は管理行為にあたり、持分の過半数（4分の3を持つA・B・C）の同意で可能（民法252条）。1は著しい変更は全員同意が必要、2は登記抹消請求は保存行為で単独可、4は支払請求の主体・要件が誤り。"},
{id:"R6-4",s:"ken",law:"相続・売買",n:4,pol:"c",a:3,
 lead:"AB間で甲土地の売買契約が締結された直後にAが死亡しCが単独相続した場合に関する記述のうち、正しいものはどれか。",
 c:["Cが引渡しを拒絶する意思を明確に表示しても、Bは相当の期間を定めた催告をしなければ契約を解除できない。",
    "Bが代金を支払わない場合でも、解除権はAの一身に専属するため、Cは契約を解除できない。",
    "Bは代金支払済みでも、所有権登記を備えなければCに引渡しを請求できない。",
    "本件契約がAの詐欺により締結された場合、BはCに対して契約の取消しを主張できる。"],
 exp:"詐欺取消権など契約上の地位は相続人Cに承継されるため、BはCに取消しを主張できます。1は履行拒絶の明確な意思表示があれば無催告解除が可能、2は解除権も相続される、3は当事者間では登記なく引渡し請求できるため誤り。"},
{id:"R6-5",s:"ken",law:"履行遅滞",n:5,pol:"c",a:1,
 lead:"履行遅滞に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",
 c:["不法行為の加害者は、損害賠償債務について、履行の請求を受けた時から遅滞の責任を負う。",
    "善意の受益者は、不当利得返還債務について、履行の請求を受けた時から遅滞の責任を負う。",
    "請負人の報酬残債務について、注文者は当該残債務の履行請求を受けた時から遅滞の責任を負う。",
    "債務に不確定期限があるときは、債務者は期限到来を知った後に履行請求を受けた時から遅滞の責任を負う。"],
 exp:"不当利得返還債務は期限の定めのない債務で、履行の請求を受けた時から遅滞となります（民法412条3項）。1は不法行為債務は損害発生時から当然に遅滞、3・4は起算点の理解が誤り。"},
{id:"R6-6",s:"ken",law:"混同",n:6,pol:"w",a:3,
 lead:"A所有の甲土地にBの地上権（登記済）が設定された後、Cの抵当権（登記済）が設定された。次のうち本件地上権が消滅するものはいくつあるか。",
 c:["ア BがAとの売買契約により甲土地の所有権を取得したとき。",
    "イ Aが死亡しBが単独相続して所有権を取得したとき。",
    "ウ BがAとの代物弁済契約により所有権を取得したとき。",
    "エ BがAとの贈与契約により所有権を取得したとき。"],
 exp:"混同による物権消滅には、第三者（後順位抵当権者C）の利益を害する場合は適用しない例外があります（民法179条但書）。ア〜エいずれも地上権を消滅させるとCを害するため消滅せず、答えは「なし」。"},
{id:"R6-7",s:"ken",law:"占有",n:7,pol:"c",a:0,
 lead:"AB間で甲建物の賃貸借契約が締結されBが引渡しを受けた場合に関する記述のうち、正しいものはどれか。",
 c:["Cの虚偽を信じたBが任意に占有をCに移転した場合、AはCに対し占有回収の訴えにより返還請求できない。",
    "Bが入口を閉ざしてAの立入りを拒んだとき、Aは間接占有が侵奪されたとして占有回収の訴えにより返還請求できる。",
    "Bが死亡しDが単独相続した場合、Dは相続開始を知るまでBの占有を承継しない。",
    "AとBのいずれもが死亡した場合、本件契約は当然に終了する。"],
 exp:"占有を任意に移転した場合は「侵奪」にあたらず、占有回収の訴えはできません。2は閉め出しは侵奪にあたらない、3は相続により占有は当然承継される、4は賃貸借は当事者の死亡で当然には終了しないため誤り。"},
{id:"R6-8",s:"ken",law:"民法総則",n:8,pol:"i",a:0,
 lead:"次の記述のうち、民法の条文として規定されていないものはどれか。",
 c:["隔地者間の契約は、承諾の通知を発した時に成立する。",
    "無効な行為に基づく債務の履行として給付を受けた者は、相手方を原状に復させる義務を負う。",
    "代理権の範囲内でも自己・第三者の利益を図る目的で行為をし相手方がその目的を知り得たときは、無権代理行為とみなす。",
    "未成年者が法律行為をするには法定代理人の同意を要する。ただし単に権利を得又は義務を免れる行為はこの限りでない。"],
 exp:"現行民法は到達主義を採用しており、隔地者間の契約成立を「発信時」とする規定（旧発信主義）は置かれていません。よって1が規定されていないもの。2〜4は条文どおり。"},
{id:"R6-9",s:"ken",law:"債務引受",n:9,pol:"c",a:1,
 lead:"承諾に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",
 c:["免責的債務引受を債務者と引受人が契約する場合、債権者の承諾は不要である。",
    "債務者と引受人が併存的債務引受をした場合、債権者が引受人に承諾をした時に効力が生じる。",
    "債権者と引受人が併存的債務引受をした場合、債務者が引受人に承諾をした時に効力が生じる。",
    "賃借人が目的物を第三者に転貸する場合、賃貸人の承諾は不要である。"],
 exp:"債務者・引受人間の併存的債務引受は、債権者が引受人に対して承諾した時に効力を生じます（民法470条3項）。1は免責的引受には債権者の関与が必要、3は債権者・引受人間の契約は債務者の承諾なく効力発生、4は転貸に賃貸人の承諾が必要で誤り。"},
{id:"R6-10",s:"ken",law:"契約不適合",n:10,pol:"c",a:3,
 lead:"目的物が品質に関して契約不適合で、その不適合が売主・買主いずれの責めにも帰せない事由による場合、買主が行使できない権利のみを掲げたものはどれか。",
 c:["履行の追完請求権、損害賠償請求権、契約の解除権",
    "代金の減額請求権、損害賠償請求権、契約の解除権",
    "履行の追完請求権、代金の減額請求権",
    "損害賠償請求権"],
 exp:"双方無責の契約不適合でも、追完・減額・解除は可能です。損害賠償だけは債務者の帰責事由を要するため行使できません（民法415条1項但書）。よって行使できない権利は損害賠償請求権のみ＝4。"},
{id:"R6-11",s:"ken",law:"借地借家法",n:11,pol:"c",a:2,
 lead:"建物所有目的の土地賃貸借（一時使用目的を除く）に関する記述のうち、借地借家法の規定によれば、正しいものはどれか。",
 c:["事業用建物所有目的で存続期間20年の借地権を設定する場合、建物買取請求権は適用されず、契約は公正証書等の書面によらなければならない。",
    "居住用建物所有目的の借地権で、設定後30年経過日に建物を相当の対価で譲渡する旨の特約を定めても無効である。",
    "借地権の存続期間を定めなかったときは、その期間は30年となる。",
    "最初の更新で存続期間を定めなかったときは、更新の日から10年となる。"],
 exp:"借地権で期間を定めないときは一律30年です（借地借家法3条）。1は存続期間20年は事業用定期借地（10〜50年未満）の要件と整合せず、2は建物譲渡特約付借地は有効、4は更新後の最初の期間は20年で誤り。"},
{id:"R6-12",s:"ken",law:"借地借家法",n:12,pol:"c",a:2,
 lead:"居住目的・期間3年の定期建物賃貸借（契約①）と普通建物賃貸借（契約②）に関する記述のうち、正しいものはどれか。",
 c:["建物がCに売却され所有者が変わった場合、Bは契約①ではCに賃借人であることを主張できるが、契約②では主張できない。",
    "賃料を改定しない旨の特約があっても、Bは契約①でも契約②でも借地借家法32条の賃料減額請求ができる。",
    "Bが相続人なしで死亡し事実上夫婦同様の同居者Dがいるとき、契約①でも契約②でも、反対の意思表示をしないDはBの権利義務を承継する。",
    "契約①は公正証書による場合に限り更新がない旨を定められ、契約②は書面で契約しAB双方の正当事由がない限りAは更新拒絶できない。"],
 exp:"内縁の同居者による賃借権の承継（借地借家法36条）は定期借家・普通借家いずれにも適用され、反対の意思表示をしなければ承継します。1は引渡しによる対抗力は両者に及ぶ、2は定期借家は減額しない特約が有効、4は定期借家は公正証書に限らず書面で可で誤り。"},
{id:"R6-13",s:"ken",law:"区分所有法",n:13,pol:"i",a:0,
 lead:"建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。",
 c:["各共有者の共用部分の持分は、規約に別段の定めがない限り、共有者数で等分する。",
    "規約及び集会の決議は、区分所有者の特定承継人に対しても効力を生ずる。",
    "管理者は、集会において毎年1回一定の時期に事務に関する報告をしなければならない。",
    "通知すべき場所の届出がないときは専有部分の所在地に宛てれば足り、通常到達すべき時に到達したものとみなされる。"],
 exp:"共用部分の持分は、原則として専有部分の床面積の割合によります（区分所有法14条）。「共有者数で等分」とする1が誤り。"},
{id:"R6-14",s:"ken",law:"不動産登記法",n:14,pol:"i",a:2,
 lead:"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。",
 c:["買戻特約の登記があり契約の日から10年経過したときは、登記権利者は単独で抹消を申請できる。",
    "不動産の収用による所有権移転登記は、起業者が単独で申請できる。",
    "相続人でない者への遺贈による所有権移転登記は、登記権利者が単独で申請できる。",
    "登記名義人の住所変更の登記は、登記名義人が単独で申請できる。"],
 exp:"相続人でない者への遺贈による移転登記は、原則として登記権利者（受遺者）と登記義務者の共同申請であり、単独申請はできません。よって3が誤り。"},
{id:"R6-15",s:"hou",law:"都市計画法",n:15,pol:"i",a:3,
 lead:"都市計画法に関する次の記述のうち、誤っているものはどれか。",
 c:["都市計画区域外でも、特に必要があるときは都市施設に関する都市計画を定めることができる。",
    "準都市計画区域では、用途地域が定められた区域であっても市街地開発事業に関する都市計画を定めることができない。",
    "準住居地域は、道路沿道としての特性にふさわしい業務の利便増進を図りつつ、調和した住居環境を保護する地域である。",
    "地区計画は用途地域が定められた区域についてのみ定められ、また定めるに当たっては地区整備計画を必ず定めなければならない。"],
 exp:"地区計画は、一定の場合には用途地域が定められていない区域にも定められ、地区整備計画も常に定めを要するわけではありません。「用途地域内のみ／必ず地区整備計画」とする4が誤り。"},
{id:"R6-16",s:"hou",law:"都市計画法",n:16,pol:"c",a:0,
 lead:"都市計画法（開発許可）に関する次の記述のうち、正しいものはどれか。",
 c:["市街化区域内で行う、病院を建築するための1,000㎡の開発行為については、知事の許可を得る必要がある。",
    "市街化区域内で開発行為を伴わない床面積1,000㎡以上の建築物の建築については、知事の許可を得る必要がある。",
    "市街化調整区域内で行う、都市計画事業の施行のための開発行為については、知事の許可を得る必要がある。",
    "許可を受けた者は、当該許可に係る土地の一定事項を自ら開発登録簿に登録しなければならない。"],
 exp:"市街化区域内では原則1,000㎡以上の開発行為に許可が必要で、病院は許可不要の公益施設に当たりません。2は開発を伴わない建築は開発許可の対象外、3は都市計画事業の施行は許可不要、4は開発登録簿への登録は知事が行うため誤り。"},
{id:"R6-17",s:"hou",law:"建築基準法",n:17,pol:"i",a:1,
 lead:"建築基準法に関する次の記述のうち、誤っているものはどれか。",
 c:["高さ25mの建築物には、安全上支障がない場合を除き、有効に避雷設備を設けなければならない。",
    "特定行政庁は、違反建築物の所有者に緊急の使用禁止・制限を仮に命ずる場合であっても、意見書提出先等を記載した通知書の交付等の手続をとらなければならない。",
    "防火地域内の共同住宅（300㎡）を増築する場合、増築部分が10㎡以内でも建築確認を受ける必要がある。",
    "劇場を映画館（500㎡）に用途変更する場合、建築確認を受ける必要はない。"],
 exp:"違反建築物への緊急の使用禁止・制限命令は、緊急の場合あらかじめの手続（意見書提出等）を経ずに仮に命ずることができます。「手続をとらなければならない」とする2が誤り。"},
{id:"R6-18",s:"hou",law:"建築基準法",n:18,pol:"c",a:1,
 lead:"次の記述のうち、建築基準法の規定によれば、正しいものはどれか。",
 c:["客席部分の床面積300㎡の映画館は、第二種住居地域内では建築できないが、準住居地域内では建築できる。",
    "特定用途誘導地区で高さの最高限度が定められていても、特定行政庁が用途上又は構造上やむを得ないと認めて許可したものは最高限度を超えてよい。",
    "計画建築物の天空率が各斜線制限に適合する建築物の天空率未満であれば、これらの制限は適用されない。",
    "建蔽率の限度が80%に指定された区域かつ防火地域内の耐火建築物について、限度を超えるには特定行政庁の許可を得る必要がある。",],
 exp:"特定用途誘導地区では、高さの最高限度が定められていても特定行政庁の許可を受けたものは超えられます。1は映画館の規模・地域の組合せが誤り、3は天空率は基準以上で制限不適用、4は建蔽率80%かつ防火地域の耐火建築物は建蔽率の制限が適用されず許可不要で誤り。"},
{id:"R6-19",s:"hou",law:"盛土規制法",n:19,pol:"i",a:2,
 lead:"宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。",
 c:["知事は基礎調査のため必要があるときは、必要の限度で他人の占有する土地に立ち入らせることができ、占有者は正当な理由がなければ拒めない。",
    "知事は規制区域内の土地について災害防止に必要があると認めるときは、所有者に擁壁等の設置等の措置を勧告できる。",
    "工事主は、規制区域で行う工事について、工事着手後2週間以内に、周辺住民に説明会の開催等の周知措置を講じなければならない。",
    "特定盛土等規制区域内の特定盛土等・土石堆積の工事は、原則として着手日の30日前までに計画を知事に届け出なければならない。"],
 exp:"周辺住民への周知措置（説明会等）は工事の着手前に講じるべきものです。「着手後2週間以内」とする3が誤り。"},
{id:"R6-20",s:"hou",law:"土地区画整理法",n:20,pol:"i",a:1,
 lead:"土地区画整理法に関する次の記述のうち、誤っているものはどれか。",
 c:["仮換地が指定された場合、従前の宅地を権原により使用収益できた者は、効力発生日から換地処分公告日まで、仮換地について従前と同じ使用収益ができる。",
    "市町村施行の土地区画整理事業において、市町村は換地処分をした場合、その旨を公告しなければならない。",
    "換地計画で定められた保留地は、換地処分の公告があった日の翌日において施行者が取得する。",
    "施行者は仮換地を指定した場合、特別の事情があるときは使用収益開始日を効力発生日と別に定めることができる。"],
 exp:"換地処分があった旨の公告は、市町村施行であっても市町村ではなく都道府県知事が行います。よって「市町村が公告する」とする2が誤り。"},
{id:"R6-21",s:"hou",law:"農地法",n:21,pol:"i",a:0,
 lead:"農地に関する次の記述のうち、農地法の規定によれば、誤っているものはどれか。",
 c:["3条1項の許可があれば所有権が移転する旨の停止条件付売買契約を原因とする所有権移転の仮登記の申請には、農業委員会の許可が必要である。",
    "5条1項の許可申請書の提出は、調停成立等一定の場合を除き、当事者が連署した申請書を提出しなければならない。",
    "期間の定めのある農地の賃貸借は、一定の場合を除き、期間満了の1年前から6か月前までに更新拒絶の通知をしないと従前と同一条件で更新したものとみなされる。",
    "農地の賃貸借の解除・解約申入れ等は、農事調停による場合等を除き、知事の許可を受けなければできない。"],
 exp:"許可を停止条件とする仮登記の申請自体には、農地法の許可は不要です。仮登記の段階では権利移転の効力が生じていないためです。「許可が必要」とする1が誤り。"},
{id:"R6-22",s:"hou",law:"国土利用計画法",n:22,pol:"c",a:3,
 lead:"国土利用計画法の事後届出（23条）及び監視区域内の事前届出（27条の7）に関する記述のうち、正しいものはどれか。",
 c:["Aの市街化区域以外の都市計画区域内4,000㎡の土地について、宅建業者Bが地上権の設定を受ける契約をした場合、Bは事後届出を行わなければならない。",
    "市街化区域内3,000㎡の土地と都市計画区域外12,000㎡の土地を金銭授受を伴わず交換した場合、C・Dともに事後届出を行う必要はない。",
    "届出が必要な土地で売買契約後、期間内に届出をしなかった者は勧告を受けることはあるが、罰則の適用を受けることはない。",
    "監視区域内の市街化区域内2,500㎡の土地の売買は、当事者が契約締結の少なくとも6週間前までに事前届出を行わなければならない。"],
 exp:"監視区域内では、知事が定める面積以上の取引について、当事者双方が契約締結前（一定期間前）に事前届出を行う必要があります。1は市街化区域外の都計区域内は5,000㎡未満で届出不要、2は交換も対象になり得る、3は無届には罰則がありうるため誤り。"},
{id:"R6-23",s:"zei",law:"所得税(住宅ローン控除)",n:23,pol:"c",a:1,
 lead:"住宅ローン控除に関する次の記述のうち、正しいものはどれか（居住用家屋は令和5年に建築確認を受けたもの）。",
 c:["前年に居住用財産の譲渡につき軽減税率の特例を受けていても、住宅ローン控除の適用を受けることができる。",
    "前年に居住用財産の買換え等の譲渡損失の損益通算の適用を受けていても、住宅ローン控除の適用を受けることができる。",
    "令和5年中に敷地を取得し令和6年中に新築・居住した場合、令和5年分の所得税について住宅ローン控除の適用を受けられる。",
    "住宅借入金等の償還期間が契約上3年とされている場合でも、居住後3年間の所得税について住宅ローン控除を受けられる。"],
 exp:"買換え等の譲渡損失の損益通算は住宅ローン控除と併用できます。1は3,000万円特別控除や軽減税率との併用は不可、3は適用は居住の用に供した年分以後、4は償還期間10年以上が要件であるため誤り。"},
{id:"R6-24",s:"zei",law:"不動産取得税",n:24,pol:"c",a:1,
 lead:"不動産取得税に関する次の記述のうち、正しいものはどれか。",
 c:["不動産取得税の課税標準は取得時の売買価格であり、固定資産税の課税標準である評価額とは異なる。",
    "課税標準が、土地10万円・建築に係る家屋1戸23万円・その他の家屋1戸12万円に満たない場合は課されない。",
    "不動産の取得に課される税であるため、法人の合併により取得した場合にも課される。",
    "個人が取得した住宅・住宅用地の税率は3%であるが、住宅以外の家屋・土地の税率は4%である。"],
 exp:"課税標準が免税点（土地10万円・新築家屋23万円・その他家屋12万円）未満なら課税されません。1は課税標準は固定資産課税台帳の評価額、3は合併による取得は形式的移転で非課税、4は土地は住宅・非住宅を問わず特例で3%のため誤り。"},
{id:"R6-25",s:"zei",law:"不動産鑑定評価",n:25,pol:"i",a:2,
 lead:"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。",
 c:["同一需給圏とは、対象不動産と代替関係が成立し価格形成に相互に影響を及ぼす関係にある他の不動産が存する圏域をいう。",
    "依頼目的に応じ、地域要因又は個別的要因について想定上の条件を設定する場合がある。",
    "不動産の効用が最高度に発揮される使用を前提に把握される価格を標準として価格が形成されることを「適合の原則」という。",
    "収益還元法は、将来の純収益の現在価値の総和を求める手法で、賃貸用不動産等の価格を求める場合に特に有効である。"],
 exp:"最有効使用を前提に価格が形成されるとする原則は「最有効使用の原則」です。「適合の原則」は環境との適合に関する原則であり、3が誤り。"},
{id:"R6-26",s:"gyo",law:"重要事項説明",n:26,pol:"w",a:2,
 lead:"宅建業法35条の重要事項説明に関する次の記述のうち、正しいものはいくつあるか（説明の相手方は業者でない）。",
 c:["ア 売買後も宅地内ガス配管設備等の所有権が販売会社にある場合は、その旨を説明しなければならない。",
    "イ 説明を行う取引士は専任でなくてよいが、書面に記名する取引士は専任でなければならない。",
    "ウ 事務所ビル一室の売買媒介で管理が委託されているときは、受託者の氏名・住所を説明しなければならない。",
    "エ 中古マンション一室の売買媒介で計画修繕積立金の規約の定めがあるときは、その内容と既積立額を説明しなければならない。"],
 exp:"ア・ウ・エは35条の説明事項に該当し正しい。イは35条書面に記名する取引士は専任である必要がなく誤り。よって正しいものは三つ。"},
{id:"R6-27",s:"gyo",law:"営業保証金",n:27,pol:"c",a:3,
 lead:"宅地建物取引業者A（保証協会の社員でない）に関する次の記述のうち、正しいものはどれか。",
 c:["主たる事務所の移転で最寄りの供託所が変わり金銭のみで供託しているときは、遅滞なく移転後の供託所に新たに供託しなければならない。",
    "従業員運転の車両で現地案内中の交通事故でケガをした者の損害賠償請求権は、営業保証金の還付対象とならない。",
    "有価証券のみで供託する場合、国債は額面の90%、地方債は額面の80%で評価される。",
    "甲県の主たる事務所とは別に乙県に従たる事務所を設置したときは、その分の営業保証金を主たる事務所の最寄りの供託所に供託しなければならない。"],
 exp:"事務所を増設したときも、その分の営業保証金は主たる事務所の最寄りの供託所にまとめて供託します。1は金銭のみのときは保管替えを請求する、2は宅建業に関する取引から生じた債権は還付対象、3は地方債の評価は90%であるため誤り。"},
{id:"R6-28",s:"gyo",law:"報酬",n:28,pol:"w",a:1,
 lead:"課税事業者A・免税事業者Bが受領した報酬に関するア〜ウのうち、宅建業法に違反しないものの組合せはどれか。",
 c:["ア 居住用建物（借賃12万円）でAは貸主から代理、Bは借主から媒介を受け、Aは貸主から6.7万円、Bは借主から6.5万円を受領（承諾なし）。",
    "イ 事業用建物で貸主借主双方から媒介、借賃10万円・権利金90万円で、貸主借主からそれぞれ5万円を受領。",
    "ウ 土地付建物（3,500万円・税込、土地2,400万円）の売買を双方媒介し各110万円を受領、ほか売主承諾済の遠隔地調査実費9万円を売主から受領。",
    "（組合せで判断します）"],
 exp:"イは事業用建物で権利金を売買代金とみなして報酬計算でき、双方から各5万円は上限内で適法。ウは報酬上限内に加え承諾済の実費は別途受領可で適法。アはAB合算が居住用の上限を超え違反。よってイ・ウ（選択肢2）。"},
{id:"R6-29",s:"gyo",law:"宅地建物取引士",n:29,pol:"c",a:3,
 lead:"宅地建物取引士に関する次の記述のうち、宅建業法の規定によれば、正しいものはどれか。",
 c:["実務経験2年未満でも、合格日から1年以内なら知事指定の講習受講により登録を受けられる。",
    "取引士証は更新せず有効期間が経過すると効力を失うが、知事に返納する必要はない。",
    "他人に名義使用を許し取引士である旨の表示をさせたときは処分対象だが、相手が登録者ならこの限りでない。",
    "事務所唯一の専任取引士が取引士証失効で取引士でなくなったときは、業者は2週間以内に必要な措置を執らなければならない。"],
 exp:"専任の取引士が不足したときは、2週間以内に補充等の措置を執る必要があります（業法31条の3）。1は2年未満は登録実務講習が必要で「知事指定の講習」ではない、2は失効した取引士証は返納義務あり、3は名義貸しは相手が登録者でも処分対象で誤り。"},
{id:"R6-30",s:"gyo",law:"クーリング・オフ",n:30,pol:"i",a:3,
 lead:"業者Aが自ら売主として非業者Bと宅地売買契約を締結し、Bが翌日にクーリング・オフで解除しようとする場合の記述のうち、誤っているものはどれか。",
 c:["クーリング・オフを告げる書面には、Aの商号・住所・免許証番号の記載は必要だが、取引士の記名は必要ない。",
    "Bが自らの申出により勤務先会社の事務所で申込み・契約をした場合、Bは解除できない。",
    "Bが自らの申出により喫茶店で申込み・契約をした場合、Bは解除できる。",
    "Bが自らの申出により融資を受ける銀行で申込み・契約をした場合、Bは解除できない。"],
 exp:"買主が指定した自宅・勤務先は「事務所等」に準じ解除できませんが、融資を受ける銀行は事務所等に当たらず解除できます。「解除できない」とする4が誤り。"},
{id:"R6-31",s:"gyo",law:"監督処分",n:31,pol:"c",a:0,
 lead:"次の記述のうち、宅建業法の規定によれば、正しいものはどれか。",
 c:["指示に従わない場合は業務の全部又は一部停止を命じることができ、業務停止処分に違反した場合は免許を取り消さなければならない。",
    "事務所の所在地を確知できないときは公告し、公告日から2週間経過しても申出がないときは免許を取り消すことができる。",
    "免許取消処分をしようとするときは聴聞を行わなければならないが、聴聞は相当と認められる場合を除き公開されない。",
    "免許取消処分をしたときは公告しなければならないが、業務停止処分をしたときは公告しなくてもよい。"],
 exp:"指示に従わない場合は業務停止を命じることができ、業務停止処分違反は必要的免許取消事由です。2は公告から30日経過が要件、3は聴聞は公開、4は業務停止処分も公告が必要であるため誤り。"},
{id:"R6-32",s:"gyo",law:"媒介契約",n:32,pol:"c",a:2,
 lead:"業者Aが中古住宅の売却依頼を受けBと専任媒介契約（専属でない）を締結した場合の記述のうち、正しいものはどれか。",
 c:["売買契約が成立しても引渡しが完了していなければ、指定流通機構に成立を通知する必要はない。",
    "Bが業者である場合は、標準媒介契約約款に基づくか否かの別を34条の2の書面に記載する必要はない。",
    "申込みがなくても、AはBに業務処理状況を2週間に1回以上報告しなければならず、その報告は書面でなくてもよい。",
    "Bが建物状況調査を実施する者のあっせんを希望しなかった場合は、あっせんに関する事項を書面に記載する必要はない。"],
 exp:"専任媒介では、申込みの有無にかかわらず2週間に1回以上の業務処理状況の報告義務があり、口頭でもかまいません。1は契約成立時は遅滞なく機構へ通知、2は約款の別は記載必要、4はあっせんの有無等は記載必要であるため誤り。"},
{id:"R6-33",s:"gyo",law:"広告",n:33,pol:"i",a:2,
 lead:"業者の広告に関する次の記述のうち、宅建業法の規定によれば、誤っているものはどれか。",
 c:["インターネット広告で、売買契約成立後も継続して広告を掲載し続けることは32条（誇大広告等の禁止）に違反する。",
    "建物を自ら貸主となって転貸するための広告では、自ら当事者となる旨を明示しなくても34条に違反しない。",
    "許可等の処分があった宅地の工事完了前の広告では、許可等があったことを明示すれば取引態様の別を明示する必要はない。",
    "分譲地を数回に分けて広告するときは、最初だけでなく次回以降の都度、取引態様の別を明示しなければならない。"],
 exp:"取引態様の別は広告の都度明示が必要であり、許可等の表示で代替することはできません。「明示する必要はない」とする3が誤り。"},
{id:"R6-34",s:"gyo",law:"手付金等の保全",n:34,pol:"i",a:2,
 lead:"業者Aが自ら売主として非業者Bに土地付建物を4,000万円で売却する場合の手付金等の保全措置に関する記述のうち、誤っているものはどれか。",
 c:["保全措置を講じず手付金100万円を受領する場合、その旨は35条書面に記載する必要があるが、37条書面に記載する必要はない。",
    "完成物件で手付金100万円受領時は保全不要だが、引渡し前に中間金400万円を受領するには手付金と合わせて保全措置を講じる必要がある。",
    "未完成物件の場合、Aは保全措置を講じずにBから手付金300万円を受領することができる。",
    "引渡し前にBがAに2,000万円を中間金として支払う契約で、Aが保全措置を講じていないときは、Bは支払を拒める。"],
 exp:"未完成物件では代金の5%超又は1,000万円超で保全が必要です。300万円は4,000万円の5%（200万円）を超えるため保全措置が必要で、「保全せず受領できる」とする3が誤り。"},
{id:"R6-35",s:"gyo",law:"37条書面(電磁的方法)",n:35,pol:"c",a:1,
 lead:"37条書面の記載事項を電磁的方法で提供することに関する記述のうち、正しいものはどれか。",
 c:["自ら売主の宅地売買で電磁的方法による提供を行う場合、あらかじめ提供に用いる方法の種類・内容を取引士に説明させなければならない。",
    "媒介する建物賃貸借で電磁的方法による提供を行う場合、その方法は交付に係る取引士が明示されるものでなければならない。",
    "相手方から書面で承諾を得た場合は、その後相手方から書面で提供を受けない旨の申出があっても提供できる。",
    "媒介する宅地売買で電磁的方法により提供する場合であっても、提供後速やかに37条書面を交付しなければならない。"],
 exp:"電磁的方法による37条書面の提供は、交付に係る取引士が明示される方法でなければなりません。1は事前の取引士説明は不要、3は受領拒否の申出があれば提供できない、4は電磁的方法によれば別途の書面交付は不要であるため誤り。"},
{id:"R6-36",s:"gyo",law:"保証協会",n:36,pol:"i",a:3,
 lead:"営業保証金及び保証協会に関する次の記述のうち、宅建業法の規定によれば、誤っているものはどれか。",
 c:["保証協会に加入しようとする者は、加入しようとする日までに政令で定める額の弁済業務保証金分担金を納付しなければならない。",
    "社員と取引した者（業者を除く）は、社員でないとした場合に供託すべき営業保証金の額に相当する範囲内で弁済を受ける権利を有する。",
    "社員の地位を失ったときは、保証協会が一定期間内に認証申出をすべき旨を公告した後でなければ、分担金の返還を受けられない。",
    "一部の事務所を廃止し営業保証金を取り戻そうとする場合は、還付請求権者への公告をすることなく取り戻すことができる。"],
 exp:"一部事務所の廃止により営業保証金を取り戻すには、原則として還付請求権者に対する公告が必要です。「公告することなく取り戻せる」とする4が誤り。"},
{id:"R6-37",s:"gyo",law:"重要事項説明",n:37,pol:"w",a:2,
 lead:"35条の重要事項説明に関する次の記述のうち、正しいものはいくつあるか（説明の相手方は業者でない）。",

/* ============================ STORAGE ============================ */
const KEY="takken-r6-progress";
let mem={};
const Store={
  async load(){
    try{
      if(window.storage){const r=await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value);}
    }catch(e){}
    return null;
  },
  async save(o){
    mem=o;
    try{ if(window.storage){ await window.storage.set(KEY, JSON.stringify(o)); } }catch(e){}
  }
};
let P={attempts:{},flags:{},qaMiss:{},wrongQ:{}};
async function initStore(){ const d=await Store.load(); if(d) P=Object.assign(P,d); }
function persist(){ Store.save(P); }

/* ============================ HELPERS ============================ */
const $=s=>document.querySelector(s);
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('#'+id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='home') renderHome();
  if(id==='stats') renderStats();
  if(id==='search'){ $('#se-input').value=''; $('#se-results').innerHTML=''; }
}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1600);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function subjCount(s){return QUESTIONS.filter(q=>q.s===s).length;}
function oxTruth(q,ci){ return q.pol==='c' ? (ci===q.a) : (ci!==q.a); } // true => ○ correct statement

/* ============================ HOME ============================ */
function renderHome(){
  let ans=0,cor=0;
  QUESTIONS.forEach(q=>{const at=P.attempts[q.id]; if(at){ans++; cor+=at.lastCorrect?1:0;}});
  const acc = ans? Math.round(cor/ans*100):0;
  $('#h-acc').innerHTML = ans? acc+'<small style="font-size:13px">%</small>' : '—';
  $('#h-done').innerHTML = ans+'<small style="font-size:13px">/50</small>';
  $('#h-streak').textContent = P.streak||0;
  $('#h-bar').style.width = (ans/50*100)+'%';
  $('#r-wrong').textContent = Object.keys(P.wrongQ).length;
  $('#r-qa').textContent = Object.keys(P.qaMiss).length;
  $('#r-flag').textContent = Object.keys(P.flags).length;
}

/* ============================ PICKER ============================ */
let pendingMode=null, chosenSubj=null;
function openPicker(mode){
  pendingMode=mode; chosenSubj=null;
  const titles={qa:"📖 一問一答",shuffle:"🔀 シャッフル出題",mock:"📋 模擬テスト"};
  const descs={qa:"科目を選んでください。各選択肢を○×で判断します。",shuffle:"科目を選んでください。選択肢がランダムに並び替わります。",mock:"科目を選んでください。本番形式で出題し、最後に採点します。"};
  $('#pk-title').textContent=titles[mode];
  $('#pk-desc').textContent=descs[mode];
  const list=$('#pk-list'); list.innerHTML='';
  const opts=[{k:'all',name:'全科目',desc:'すべての問題から出題',hex:'#23303a'}]
    .concat(Object.entries(SUBJECTS).map(([k,v])=>({k,name:v.name,desc:v.desc,hex:v.hex})));
  opts.forEach(o=>{
    const cnt = o.k==='all'? QUESTIONS.length : subjCount(o.k);
    const avail = mode==='qa'? (o.k==='all'?QUESTIONS.filter(q=>q.pol!=='w').length:QUESTIONS.filter(q=>q.s===o.k&&q.pol!=='w').length) : cnt;
    const b=document.createElement('button');
    b.innerHTML=`<span class="dot" style="background:${o.hex}"></span><div class="t"><b>${o.name}</b><span>${o.desc}</span></div><span class="ct">${avail}問</span>`;
    b.onclick=()=>{chosenSubj=o.k; list.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); $('#pk-start').disabled=false;};
    list.appendChild(b);
  });
  $('#pk-start').disabled=true;
  go('picker');
}
function startFromPicker(){
  let pool = chosenSubj==='all'? QUESTIONS.slice() : QUESTIONS.filter(q=>q.s===chosenSubj);
  if(pendingMode==='qa'){
    pool=pool.filter(q=>q.pol!=='w');
    let items=[];
    shuffle(pool).forEach(q=>{ q.c.slice(0,4).forEach((c,ci)=>{ if(q.pol==='w')return; items.push({type:'ox',q,ci}); }); });
    startQuiz(items,{mode:'qa',label:'一問一答'});
  }else if(pendingMode==='shuffle'){
    const items=shuffle(pool).map(q=>({type:'mc',q,order:shuffle([0,1,2,3])}));
    startQuiz(items,{mode:'shuffle',label:'シャッフル'});
  }else{ // mock
    const items=pool.map(q=>({type:'mc',q,order:[0,1,2,3]}));
    startQuiz(items,{mode:'mock',label:'模擬テスト',scored:true});
  }
}
function startWeak(){
  const ids=Object.keys(P.wrongQ);
  if(!ids.length){ toast('間違えた問題はまだありません'); return; }
  const pool=QUESTIONS.filter(q=>P.wrongQ[q.id]);
  const items=shuffle(pool).map(q=>({type:'mc',q,order:shuffle([0,1,2,3])}));
  startQuiz(items,{mode:'weak',label:'苦手集中'});
}

/* ============================ QUIZ ENGINE ============================ */
let Q={items:[],i:0,opt:null,correct:0,answered:false};
function startQuiz(items,opt){
  if(!items.length){toast('対象の問題がありません');return;}
  Q={items,i:0,opt,correct:0,answered:false};
  go('quiz'); renderItem();
}
function renderItem(){
  Q.answered=false;
  const it=Q.items[Q.i];
  $('#q-prog').style.width=((Q.i)/Q.items.length*100)+'%';
  $('#q-count').textContent=(Q.i+1)+' / '+Q.items.length;
  const sub=SUBJECTS[it.q.s];
  const body=$('#q-body');
  if(it.type==='ox'){
    const stmt=it.q.c[it.ci];
    body.innerHTML=`
      <div class="qcard">
        <div class="qmeta">
          <span class="tag" style="background:${sub.color}">${sub.name}</span>
          <span class="tag ghost">${it.q.law}</span>
          <span class="tag ghost">R6 問${it.q.n}-${'①②③④'[it.ci]}</span>
        </div>
        <div style="font-size:12px;color:var(--ink2);margin-bottom:6px">次の記述は正しい（○）か、誤り（×）か。</div>
        <div class="oxstmt">${stmt}</div>
        <div class="oxbtns">
          <button class="oxbtn maru" onclick="answerOX(true)">○</button>
          <button class="oxbtn batsu" onclick="answerOX(false)">×</button>
        </div>
        <div id="fb-slot"></div>
      </div>`;
  }else{
    const order=it.order||[0,1,2,3];
    let ch='';
    order.forEach((orig,pos)=>{
      ch+=`<button class="choice" data-orig="${orig}" onclick="answerMC(${orig},this)"><span class="num">${pos+1}</span><span>${it.q.c[orig]}</span></button>`;
    });
    body.innerHTML=`
      <div class="qcard">
        <div class="qmeta">
          <span class="tag" style="background:${sub.color}">${sub.name}</span>
          <span class="tag ghost">${it.q.law}</span>
          <span class="tag ghost">R6 問${it.q.n}</span>
        </div>
        <div class="qstem"><span class="lead">${it.q.lead}</span></div>
        <div class="choices">${ch}</div>
        <div id="fb-slot"></div>
      </div>`;
  }
}
function recordMC(q,correct){
  const a=P.attempts[q.id]||{c:0,w:0};
  if(correct)a.c++;else a.w++;
  a.lastCorrect=correct; P.attempts[q.id]=a;
  if(!correct)P.wrongQ[q.id]=true;
  P.streak = correct? (P.streak||0)+1 : 0;
  persist();
}
function answerMC(orig,el){
  if(Q.answered)return; Q.answered=true;
  const it=Q.items[Q.i]; const correct=(orig===it.q.a);
  if(correct)Q.correct++;
  recordMC(it.q,correct);
  document.querySelectorAll('.choice').forEach(b=>{
    const o=+b.dataset.orig;
    if(o===it.q.a)b.classList.add('correct');
    else if(o===orig)b.classList.add('wrong');
    else b.classList.add('dim');
    b.onclick=null;
  });
  showFeedback(correct, it.q, (it.q.a+1)+'番が正解');
}
function answerOX(userMaru){
  if(Q.answered)return; Q.answered=true;
  const it=Q.items[Q.i]; const truth=oxTruth(it.q,it.ci); // true => ○
  const correct=(userMaru===truth);
  document.querySelectorAll('.oxbtn').forEach(b=>b.onclick=null);
  const key=it.q.id+':'+it.ci;
  if(correct){ Q.correct++; delete P.qaMiss[key]; P.streak=(P.streak||0)+1; }
  else { P.qaMiss[key]=true; P.wrongQ[it.q.id]=true; P.streak=0; }
  persist();
  const lab = truth? 'この記述は ○（正しい）' : 'この記述は ×（誤り）';
  showFeedback(correct, it.q, lab);
}
function showFeedback(correct, q, ansLabel){
  const key=q.id+(Q.items[Q.i].type==='ox'?(':'+Q.items[Q.i].ci):'');
  const flagged=!!P.flags[key];
  const last=(Q.i===Q.items.length-1);
  const slot=$('#fb-slot');
  slot.innerHTML=`
    <div class="fb ${correct?'ok':'ng'}">
      <div class="ttl">${correct?'⭕ 正解':'❌ 不正解'}<span class="ans">${ansLabel}</span></div>
      <div class="exp">${q.exp}</div>
    </div>
    <div class="fbbar">
      <button class="flagbtn ${flagged?'on':''}" id="flagbtn" onclick="toggleFlag('${key}')">${flagged?'🚩 フラグ中':'🚩 フラグ'}</button>
      <button class="nextbtn" onclick="nextItem()">${last?'結果を見る':'次へ →'}</button>
    </div>`;
  slot.scrollIntoView({behavior:'smooth',block:'nearest'});
  $('#q-prog').style.width=((Q.i+1)/Q.items.length*100)+'%';
}
function toggleFlag(key){
  if(P.flags[key])delete P.flags[key]; else P.flags[key]=true; persist();
  const b=$('#flagbtn'); const on=!!P.flags[key];
  b.classList.toggle('on',on); b.textContent=on?'🚩 フラグ中':'🚩 フラグ';
}
function nextItem(){
  if(Q.i<Q.items.length-1){ Q.i++; renderItem(); window.scrollTo(0,0); }
  else finishQuiz();
}
function confirmQuit(){
  if(Q.i===0 && !Q.answered){ go('home'); return; }
  if(confirm('クイズを終了してホームに戻りますか？')) go('home');
}

/* ============================ RESULT ============================ */
function finishQuiz(){
  const total=Q.items.length, cor=Q.correct;
  const pct=Math.round(cor/total*100);
  go('result');
  const col = pct>=70? 'var(--ok)' : pct>=50? 'var(--brass)':'var(--ng)';
  const R=80, C=2*Math.PI*R, off=C*(1-pct/100);
  $('#r-ring').innerHTML=`
    <svg viewBox="0 0 180 180"><circle cx="90" cy="90" r="${R}" fill="none" stroke="var(--paper2)" stroke-width="13"/>
    <circle cx="90" cy="90" r="${R}" fill="none" stroke="${col}" stroke-width="13" stroke-linecap="round"
    stroke-dasharray="${C}" stroke-dashoffset="${C}" style="transition:stroke-dashoffset 1s ease"/></svg>
    <div class="pct" style="color:${col}">${pct}<small>%</small></div>`;
  setTimeout(()=>{$('#r-ring svg circle:last-child').style.strokeDashoffset=off;},80);
  const msg = pct>=70?'合格ラインです！':pct>=50?'もう一息！':'復習で立て直そう';
  $('#r-title').textContent=msg;
  $('#r-sub').textContent=Q.opt.label+'（'+total+'問）';
  $('#r-box').innerHTML=`
    <div class="resrow"><span>正解</span><b style="color:var(--ok)">${cor} 問</b></div>
    <div class="resrow"><span>不正解</span><b style="color:var(--ng)">${total-cor} 問</b></div>
    <div class="resrow"><span>正答率</span><b>${pct}%</b></div>`;
}

/* ============================ STATS ============================ */
function renderStats(){
  let ans=0,cor=0; QUESTIONS.forEach(q=>{const a=P.attempts[q.id];if(a){ans++;cor+=a.lastCorrect?1:0;}});
  const acc=ans?Math.round(cor/ans*100):0;
  $('#st-acc').textContent=ans?acc+'%':'—';
  $('#st-meta').textContent=ans?`${ans}問解答 / ${cor}問正解`:'まだ解答がありません';
  $('#st-bars').innerHTML='';
  const subjEl=$('#st-subj'); subjEl.innerHTML='';
  Object.entries(SUBJECTS).forEach(([k,v])=>{
    const qs=QUESTIONS.filter(q=>q.s===k);
    let a2=0,c2=0; qs.forEach(q=>{const at=P.attempts[q.id];if(at){a2++;c2+=at.lastCorrect?1:0;}});
    const p=a2?Math.round(c2/a2*100):0;
    const card=document.createElement('div'); card.className='statcard'; card.style.marginTop='12px';
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <b style="font-size:15px">${v.name}</b>
        <span style="font-size:12px;color:var(--ink2)">${a2}/${qs.length}問 解答</span>
      </div>
      <div class="sbar"><div class="lab"><span>正答率</span><span>${a2?p+'%':'—'}</span></div>
      <div class="track"><i style="width:${p}%;background:${v.color}"></i></div></div>`;
    subjEl.appendChild(card);
  });
}

/* ============================ SEARCH ============================ */
function runSearch(){
  const kw=$('#se-input').value.trim();
  const box=$('#se-results');
  if(!kw){box.innerHTML='';return;}
  const res=QUESTIONS.filter(q=>(q.lead+q.c.join('')+q.law).includes(kw));
  if(!res.length){box.innerHTML=`<div class="empty"><span class="ic">🔍</span>「${kw}」に一致する問題が<br>見つかりませんでした。</div>`;return;}
  box.innerHTML=res.map(q=>{const s=SUBJECTS[q.s];
    return `<div class="listitem" onclick="viewQuestion('${q.id}')">
      <div class="h"><span class="tag" style="background:${s.color}">${s.name}</span><span class="tag ghost">R6 問${q.n}</span></div>
      <div class="body">${q.lead}</div></div>`;}).join('');
}
function viewQuestion(id){
  const q=QUESTIONS.find(x=>x.id===id); if(!q)return;
  const items=[{type:'mc',q,order:[0,1,2,3]}];
  Q={items,i:0,opt:{mode:'view',label:'検索結果'},correct:0,answered:false};
  go('quiz'); renderItem();
}

/* ============================ REVIEW ============================ */
function openReview(kind){
  const titles={wrong:'間違えた問題',qa:'一問一答の間違い',flag:'フラグした選択肢'};
  $('#rv-title').textContent=titles[kind];
  const list=$('#rv-list');
  if(kind==='wrong'){
    const ids=Object.keys(P.wrongQ);
    if(!ids.length)return list.innerHTML=emptyMsg('❌','間違えた問題はありません','問題を解いて誤答すると、ここに集まります。');
    const qs=QUESTIONS.filter(q=>P.wrongQ[q.id]);
    list.innerHTML=`<button class="startbtn" style="position:static;margin:14px 0 6px" onclick="startWeak()">この${qs.length}問を再挑戦 →</button>`+
      qs.map(q=>reviewCard(q,q.lead)).join('');
  }else if(kind==='qa'){
    const keys=Object.keys(P.qaMiss);
    if(!keys.length)return list.innerHTML=emptyMsg('📝','一問一答の間違いはありません','○×で誤った選択肢がここに残ります。');
    list.innerHTML=keys.map(k=>{const[id,ci]=k.split(':');const q=QUESTIONS.find(x=>x.id===id);if(!q)return'';
      const s=SUBJECTS[q.s];const truth=oxTruth(q,+ci);
      return `<div class="listitem" onclick="viewQuestion('${id}')">
        <div class="h"><span class="tag" style="background:${s.color}">${s.name}</span><span class="tag ghost">R6 問${q.n}-${'①②③④'[+ci]}</span><span class="tag ghost">正解 ${truth?'○':'×'}</span></div>
        <div class="body">${q.c[+ci]}</div></div>`;}).join('');
  }else{
    const keys=Object.keys(P.flags);
    if(!keys.length)return list.innerHTML=emptyMsg('🚩','フラグはありません','解説画面の🚩で、見返したい問題に印を付けられます。');
    list.innerHTML=keys.map(k=>{const[id,ci]=k.split(':');const q=QUESTIONS.find(x=>x.id===id);if(!q)return'';
      const s=SUBJECTS[q.s];const isOx=ci!==undefined;
      return `<div class="listitem" onclick="viewQuestion('${id}')">
        <div class="h"><span class="tag" style="background:${s.color}">${s.name}</span><span class="tag ghost">R6 問${q.n}${isOx?'-'+'①②③④'[+ci]:''}</span></div>
        <div class="body">${isOx?q.c[+ci]:q.lead}</div></div>`;}).join('');
  }
  go('review');
}
function reviewCard(q,text){const s=SUBJECTS[q.s];
  return `<div class="listitem" onclick="viewQuestion('${q.id}')">
    <div class="h"><span class="tag" style="background:${s.color}">${s.name}</span><span class="tag ghost">R6 問${q.n}</span></div>
    <div class="body">${text}</div></div>`;}
function emptyMsg(ic,t,s){return `<div class="empty"><span class="ic">${ic}</span><b>${t}</b><br><span style="font-size:12px">${s}</span></div>`;}

/* ============================ RESET ============================ */
function resetData(){
  if(!confirm('解答履歴・フラグをすべて消去します。よろしいですか？'))return;
  P={attempts:{},flags:{},qaMiss:{},wrongQ:{},streak:0}; persist();
  toast('学習データをリセットしました'); renderHome();
}

/* ============================ BOOT ============================ */
$('#se-input').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch();});
(async()=>{ await initStore(); renderHome(); })();
</script>
